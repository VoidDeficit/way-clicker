version: 1

script:
  - rm -rf AppDir || true
  # app code
  - mkdir -p AppDir/usr/local/lib/way-clicker
  - cp main.py AppDir/usr/local/lib/way-clicker/main.py
  # install Python deps into the AppDir's Python path
  - pip3 install --target AppDir/usr/lib/python3/dist-packages pynput pystray Pillow
  # symlinks so Tcl finds its scripts at the paths it searches inside the AppDir
  - mkdir -p AppDir/usr/lib
  - ln -sf ../share/tcltk/tcl8.6 AppDir/usr/lib/tcl8.6
  - ln -sf ../share/tcltk/tk8.6 AppDir/usr/lib/tk8.6
  # icon
  - mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - cp way-clicker.svg AppDir/usr/share/icons/hicolor/scalable/apps/way-clicker.svg
  - rsvg-convert -w 256 -h 256 way-clicker.svg -o AppDir/usr/share/icons/hicolor/256x256/apps/way-clicker.png
  # desktop entry
  - mkdir -p AppDir/usr/share/applications
  - |
    cat > AppDir/usr/share/applications/io.github.way-clicker.desktop << 'EOF'
    [Desktop Entry]
    Name=Way Clicker
    Comment=Wayland auto clicker
    Exec=way-clicker
    Icon=way-clicker
    Type=Application
    Categories=Utility;
    EOF
  # AppStream metainfo (Shelly and other managers read this for repo/update info)
  - mkdir -p AppDir/usr/share/metainfo
  - |
    cat > AppDir/usr/share/metainfo/io.github.way-clicker.appdata.xml << EOF
    <?xml version="1.0" encoding="UTF-8"?>
    <component type="desktop-application">
      <id>io.github.way-clicker</id>
      <metadata_license>MIT</metadata_license>
      <project_license>MIT</project_license>
      <name>Way Clicker</name>
      <summary>Wayland auto clicker</summary>
      <description><p>Lightweight Wayland auto clicker via the XDG RemoteDesktop portal.</p></description>
      <url type="homepage">https://github.com/VoidDeficit/way-clicker</url>
      <url type="bugtracker">https://github.com/VoidDeficit/way-clicker/issues</url>
      <url type="vcs-browser">https://github.com/VoidDeficit/way-clicker</url>
      <releases>
        <release version="${APP_VERSION}" date="$(date -u +%Y-%m-%d)"/>
      </releases>
    </component>
    EOF

AppDir:
  path: ./AppDir

  app_info:
    id: io.github.way-clicker
    name: Way Clicker
    icon: way-clicker
    version: !ENV '${APP_VERSION}'
    exec: usr/bin/python3
    exec_args: $APPDIR/usr/local/lib/way-clicker/main.py $@

  runtime:
    env:
      TCL_LIBRARY: '${APPDIR}/usr/share/tcltk/tcl8.6'
      TK_LIBRARY: '${APPDIR}/usr/share/tcltk/tk8.6'
      TKPATH: '${APPDIR}/usr/share/tcltk/tk8.6'

  apt:
    arch: amd64
    sources:
      - sourceline: 'deb [trusted=yes] http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse'

    include:
      - python3
      - python3-tk
      - python3-dbus
      - python3-gi
      - python3-pil
      - gir1.2-glib-2.0
      - gir1.2-appindicator3-0.1
      - libdbus-1-3
      - libglib2.0-0
      - libappindicator3-1
      - tcl8.6
      - tk8.6

    exclude:
      - perl
      - perl-base
      - gcc
      - make

  files:
    exclude:
      - usr/share/man
      - usr/share/doc/*/README.*
      - usr/share/doc/*/changelog.*
      - usr/share/doc/*/NEWS.*
      - usr/share/doc/*/TODO.*
      - usr/lib/python3/dist-packages/test
      - usr/lib/python3*/test

AppImage:
  arch: x86_64
  update-information: 'gh-releases-zsync|VoidDeficit|way-clicker|latest|Way-Clicker-x86_64.AppImage.zsync'
  sign-key: None
