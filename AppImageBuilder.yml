version: 1

script:
  - rm -rf AppDir || true
  # app code
  - mkdir -p AppDir/usr/local/lib/way-clicker
  - cp main.py AppDir/usr/local/lib/way-clicker/main.py
  # icon (scalable + 256px raster for launchers that need PNG)
  - mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - cp way-clicker.svg AppDir/usr/share/icons/hicolor/scalable/apps/way-clicker.svg
  - rsvg-convert -w 256 -h 256 way-clicker.svg -o AppDir/usr/share/icons/hicolor/256x256/apps/way-clicker.png
  # desktop entry
  - mkdir -p AppDir/usr/share/applications
  - |
    cat > AppDir/usr/share/applications/way-clicker.desktop << 'EOF'
    [Desktop Entry]
    Name=Way Clicker
    Comment=Wayland auto clicker
    Exec=way-clicker
    Icon=way-clicker
    Type=Application
    Categories=Utility;
    EOF

AppDir:
  path: ./AppDir

  app_info:
    id: io.github.way-clicker
    name: Way Clicker
    icon: way-clicker
    version: !ENV '${APP_VERSION:-dev}'
    exec: usr/bin/python3
    exec_args: usr/local/lib/way-clicker/main.py $@

  apt:
    arch: amd64
    sources:
      - sourceline: 'deb http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse'
        key_url: 'https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x3b4fe6acc0b21f32'

    include:
      - python3
      - python3-tk
      - python3-dbus
      - python3-gi
      - gir1.2-glib-2.0
      - libdbus-1-3
      - libglib2.0-0
      - librsvg2-bin   # rsvg-convert for icon conversion

    exclude:
      - perl
      - perl-base
      - gcc
      - make

  pip:
    arch: amd64
    requirements:
      - pynput>=1.7

  files:
    exclude:
      - usr/share/man
      - usr/share/doc/*/README.*
      - usr/share/doc/*/changelog.*
      - usr/share/doc/*/NEWS.*
      - usr/share/doc/*/TODO.*
      - usr/lib/python3/dist-packages/test
      - usr/lib/python3*/test

AppImage:
  arch: x86_64
  update-information: None
  sign-key: None
  version: !ENV '${APP_VERSION:-dev}'
