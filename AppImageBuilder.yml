version: 1

script:
  - rm -rf AppDir || true
  # app code
  - mkdir -p AppDir/usr/local/lib/way-clicker
  - cp main.py AppDir/usr/local/lib/way-clicker/main.py
  # install pynput into the AppDir's Python path
  - pip3 install --target AppDir/usr/lib/python3/dist-packages pynput
  # launcher wrapper — sets TCL/TK library paths before starting Python
  - mkdir -p AppDir/usr/bin
  - |
    cat > AppDir/usr/bin/way-clicker << 'LAUNCHER'
    #!/bin/bash
    export TCL_LIBRARY="${APPDIR}/usr/share/tcltk/tcl8.6"
    export TK_LIBRARY="${APPDIR}/usr/share/tcltk/tk8.6"
    export TKPATH="${TK_LIBRARY}"
    exec "${APPDIR}/usr/bin/python3" "${APPDIR}/usr/local/lib/way-clicker/main.py" "$@"
    LAUNCHER
  - chmod +x AppDir/usr/bin/way-clicker
  # icon (scalable + 256px raster for launchers that need PNG)
  - mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - cp way-clicker.svg AppDir/usr/share/icons/hicolor/scalable/apps/way-clicker.svg
  - rsvg-convert -w 256 -h 256 way-clicker.svg -o AppDir/usr/share/icons/hicolor/256x256/apps/way-clicker.png
  # desktop entry
  - mkdir -p AppDir/usr/share/applications
  - |
    cat > AppDir/usr/share/applications/io.github.way-clicker.desktop << 'EOF'
    [Desktop Entry]
    Name=Way Clicker
    Comment=Wayland auto clicker
    Exec=way-clicker
    Icon=way-clicker
    Type=Application
    Categories=Utility;
    EOF

AppDir:
  path: ./AppDir

  app_info:
    id: io.github.way-clicker
    name: Way Clicker
    icon: way-clicker
    version: !ENV '${APP_VERSION}'
    exec: usr/bin/way-clicker
    exec_args: $@

  apt:
    arch: amd64
    sources:
      - sourceline: 'deb [trusted=yes] http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse'

    include:
      - python3
      - python3-tk
      - python3-dbus
      - python3-gi
      - gir1.2-glib-2.0
      - libdbus-1-3
      - libglib2.0-0
      - tcl8.6        # provides /usr/share/tcltk/tcl8.6/init.tcl
      - tk8.6         # provides /usr/share/tcltk/tk8.6/

    exclude:
      - perl
      - perl-base
      - gcc
      - make

  files:
    exclude:
      - usr/share/man
      - usr/share/doc/*/README.*
      - usr/share/doc/*/changelog.*
      - usr/share/doc/*/NEWS.*
      - usr/share/doc/*/TODO.*
      - usr/lib/python3/dist-packages/test
      - usr/lib/python3*/test

AppImage:
  arch: x86_64
  update-information: None
  sign-key: None
