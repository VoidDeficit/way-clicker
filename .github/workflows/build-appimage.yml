name: Build AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. v1.0.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version || 'dev' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3 python3-pip python3-tk \
            python3-dbus python3-gi \
            gir1.2-glib-2.0 \
            libdbus-1-dev libglib2.0-dev \
            librsvg2-bin \
            squashfs-tools patchelf \
            desktop-file-utils \
            libfuse2 fuse

      - name: Install appimage-builder
        run: pip3 install appimage-builder

      - name: Build AppImage
        env:
          APP_VERSION: ${{ steps.ver.outputs.version || 'dev' }}
        run: appimage-builder --recipe AppImageBuilder.yml --skip-test

      - name: Rename artifact
        run: |
          mv Way_Clicker*.AppImage "Way-Clicker-x86_64.AppImage" 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Way-Clicker-x86_64
          path: '*.AppImage'
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.AppImage'
          generate_release_notes: true
          fail_on_unmatched_files: true
